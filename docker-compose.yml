version: '3.2'
services:
 app:
  build: .
  container_name: Todo-app
  ports:
    - "8080:80"
  depends_on : 
   - db

  environment:
    DB_HOST: db
    DB_PORT: 3306
    DB_USER: todouser
    DB_PASS: admin123
    DB_Name: todo_app
  
  volumes:
  - .:/var/www/html

 db:
  image: mysql:8.0
  container_name: todo_db
  restart: always
  environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: todo_app
      MYSQL_USER: todouser
      MYSQL_PASSWORD: admin123
  ports:
      - "3306:3306"
  volumes:
      - db_data:/var/lib/mysql        # persist DB data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql  # auto-import schema

volumes:
  db_data:
